            if (commandPaletteOpen) {
                paletteEl.classList.remove('hidden');
                document.getElementById('commandInput').value = '';
                filterCommands('');
                setTimeout(() => document.getElementById('commandInput').focus(), 50);
            } else {
                paletteEl.classList.add('hidden');
            }
        }

        function filterCommands(query) {
            const list = document.getElementById('commandList');
            if (!list) return;
            list.innerHTML = '';
            
            const baseCommands = [
                { name: 'Go to Dashboard', icon: 'fa-chart-line', action: () => { navigate('dashboard'); toggleCommandPalette(); } },
                { name: 'Go to Template Builder', icon: 'fa-diagram-project', action: () => { navigate('template-builder'); toggleCommandPalette(); } },
                { name: 'Toggle Light/Dark Theme', icon: 'fa-circle-half-stroke', action: () => { toggleTheme(); toggleCommandPalette(); } }
            ];
            
            const projectCommands = (store.projects || []).map(p => ({
                name: `Open Project: ${p.project_name}`,
                icon: 'fa-ship',
                action: () => { navigate('project-view', p.id); toggleCommandPalette(); }
            }));
            
            const all = [...baseCommands, ...projectCommands];
            const filtered = all.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="p-4 text-center text-xs text-slate-400">No commands or projects found.</div>`;
                return;
            }
            
            filtered.forEach(c => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/80 cursor-pointer text-xs font-bold text-slate-700 dark:text-slate-200 transition-colors';
                item.innerHTML = `
                    <i class="fa-solid ${c.icon} text-slate-400 text-sm w-4"></i>
                    <span>${c.name}</span>
                `;
                item.onclick = c.action;
                list.appendChild(item);
            });
        }

        // Key listeners for Ctrl+K and ESC
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                toggleCommandPalette();
            }
            if (e.key === 'Escape' && commandPaletteOpen) {
                toggleCommandPalette();
            }
        });

        // Gantt Playback animation helper logic
        function toggleGanttPlayback() {
            if (store.playbackActive) {
                clearInterval(store.playbackInterval);
                store.playbackActive = false;
            } else {
                store.playbackActive = true;
                
                const g = store.ganttData.activities;
                let minTime = Infinity;
                let maxTime = -Infinity;
                g.forEach(act => {
                    if (act.start_date) {
                        const t = new Date(act.start_date).getTime();
                        if (t < minTime) minTime = t;
                    }
                    if (act.end_date) {
                        const t = new Date(act.end_date).getTime();
                        if (t > maxTime) maxTime = t;
                    }
                });
                const oneDay = 24 * 60 * 60 * 1000;
                if (minTime === Infinity) minTime = new Date().getTime() - 7 * oneDay;
                if (maxTime === -Infinity) maxTime = new Date().getTime() + 360 * oneDay + 7 * oneDay;
                
                minTime -= 7 * oneDay;
                maxTime += 7 * oneDay;
                const totalDuration = maxTime - minTime;
                const totalDays = Math.ceil(totalDuration / oneDay);
                
                if (store.playbackDay >= totalDays) {
                    store.playbackDay = 0;
                }
                
                store.playbackInterval = setInterval(() => {
                    store.playbackDay += 2;
                    if (store.playbackDay >= totalDays) {
                        store.playbackDay = totalDays;
                        clearInterval(store.playbackInterval);
                        store.playbackActive = false;
                    }
                    render();
                }, 80);
            }
            render();
        }

        function resetGanttPlayback() {
            if (store.playbackInterval) {
                clearInterval(store.playbackInterval);
            }
            store.playbackActive = false;
            store.playbackDay = 0;
            render();
        }

        function setGanttPlaybackDay(day) {
            store.playbackDay = day;
            render();
        }

        function initApp() {
            // Read initial sidebar state
            store.sidebarCollapsed = localStorage.getItem('pmis_sidebar_collapsed') === 'true';
            
            if (store.token) {
                collab.init();
                if (store.user.role === 'Admin' && store.user.is_first_login) {
                    navigate('template-builder');
                } else {
                    navigate('dashboard');
                }
            } else {
                navigate('login');
            }
        }

        // Initial setup
        initApp();
    </script>
</body>
</html>
