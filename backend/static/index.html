<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50 dark:bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Navy Ship Acquisition PMIS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (Offline) -->
    <script src="assets/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        navy: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#bbf7d0',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                            950: '#082f49',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons (Offline) -->
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <!-- Custom Stylesheet (Offline) -->
    <link rel="stylesheet" href="assets/custom.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom scrollbar for clean UI */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glassmorphism styling cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.7);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
        }

        /* Critical path glowing effect */
        .critical-glow {
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5) !important;
        }

        /* Skeleton loader shimmer */
        .skeleton-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Scale animation for modal & command palette */
        @keyframes scaleIn {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Collapsible sidebar widths */
        .sidebar-expanded {
            width: 16rem; /* 64 */
        }
        .sidebar-collapsed {
            width: 4rem; /* 16 */
        }
        .sidebar-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="h-full text-slate-800 dark:text-slate-100 transition-colors duration-200">
    <!-- Main App Container -->
    <div id="app" class="h-full flex flex-col">
        <!-- Views will be dynamically loaded here -->
    </div>

    <!-- Main Application JavaScript -->
    <script>
        // State Store
        const store = {
            token: localStorage.getItem('pmis_token') || '',
            user: JSON.parse(localStorage.getItem('pmis_user')) || null,
            currentView: 'login', // login, dashboard, template-builder, project-view
            currentProjectId: null,
            theme: localStorage.getItem('pmis_theme') || 'light',
            
            // Cached data
            projects: [],
            templates: [],
            dashboardSummary: null,
            currentProject: null,
            currentActivities: [],
            ganttData: null,
            predictions: null,
            predictionHistory: []
        };

        const emailMap = {
            'admin': 'admin@navalpmis.gov',
            'pm': 'pm@navalpmis.gov',
            'engineer': 'engineer@navalpmis.gov',
            'viewer': 'viewer@navalpmis.gov'
        };

        const collab = {
            socket: null,
            project: null,
            projectId: null,
            activities: [],
            activeLocks: new Map(), // activityId -> { userId, userName }
            onlineUsers: [],
            notifications: [],

            async init() {
                if (!store.user) return;
                const token = await this.getToken();
                if (!token) return;

                // 1. Connect Socket.IO
                this.socket = io('http://localhost:5000', {
                    auth: { token }
                });

                this.socket.on('connect', () => {
                    console.log('Collaboration socket connected:', this.socket.id);
                    if (store.currentProjectId) {
                        this.syncProjectContext(store.currentProject.project_id_code);
                    }
                });

                this.socket.on('presence-list-updated', (users) => {
                    this.onlineUsers = users;
                    this.renderPresence();
                });

                this.socket.on('activity-locked', ({ activityId, userId, userName }) => {
                    this.activeLocks.set(activityId.toString(), { userId, userName });
                    this.renderLocks();
                });

                this.socket.on('activity-unlocked', ({ activityId }) => {
                    this.activeLocks.delete(activityId.toString());
                    this.renderLocks();
                });

                this.socket.on('activity-updated', ({ activity, project, auditLogs }) => {
                    // Receive real-time CPM update from other users
                    if (store.currentProject && store.currentProject.project_id_code === project.projectIdCode) {
                        // Refresh SQLite local store from Python backend
                        loadProjectWorkspace(store.currentProjectId);
                    }
                });

                this.socket.on('comment-added', (comment) => {
                    if (this.project && comment.projectId === this.project._id && store.activeTab === 'comments') {
                        this.fetchComments();
                    }
                });

                this.socket.on('document-added', (doc) => {
                    if (this.project && doc.projectId === this.project._id && store.activeTab === 'documents') {
                        this.fetchDocuments();
                    }
                });

                this.socket.on('notification-received', (notif) => {
                    this.notifications.unshift(notif);
                    this.renderNotificationsDropdown();
                    showToast(notif.content, "info");
                });

                // Fetch initial notifications
                this.fetchNotifications();
            },

            async getToken() {
                let tok = localStorage.getItem('collab_token');
                if (tok) return tok;
                try {
                    const username = store.user.username.toLowerCase();
                    const email = emailMap[username] || `${username}@navalpmis.gov`;
                    const res = await fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: 'password123' })
                    });
                    const data = await res.json();
                    if (data.token) {
                        localStorage.setItem('collab_token', data.token);
                        localStorage.setItem('collab_user', JSON.stringify(data.user));
                        return data.token;
                    }
                } catch(e) {
                    console.error("Collab login error:", e);
                }
                return null;
            },

            async syncProjectContext(projectCode) {
                try {
                    const token = localStorage.getItem('collab_token');
                    const res = await fetch('http://localhost:5000/api/auth/projects', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const projects = await res.json();
                    const matchedProj = projects.find(p => p.projectIdCode === projectCode);
                    if (matchedProj) {
                        this.project = matchedProj;
                        this.projectId = matchedProj._id;
                        
                        // Join socket room
                        if (this.socket) {
                            this.socket.emit('join-project', { projectId: this.projectId });
                        }

                        // Fetch collab activities to map __v
                        const actRes = await fetch(`http://localhost:5000/api/activities/project/${this.projectId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        this.activities = await actRes.json();
                        
                        this.renderPresence();
                    }
                } catch (e) {
                    console.error("Error syncing project context:", e);
                }
            },

            async fetchNotifications() {
                try {
                    const token = localStorage.getItem('collab_token');
                    const res = await fetch('http://localhost:5000/api/notifications', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    this.notifications = await res.json();
                    this.renderNotificationsDropdown();
                } catch (e) {}
            },

            renderNotificationsDropdown() {
                const badge = document.getElementById('collab-notif-badge');
                const list = document.getElementById('collab-notif-list');
                if (!badge || !list) return;

                const unread = this.notifications.filter(n => !n.isRead);
                if (unread.length > 0) {
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }

                if (this.notifications.length === 0) {
                    list.innerHTML = `<div class="p-4 text-center text-slate-400">No notifications.</div>`;
                    return;
                }

                list.innerHTML = this.notifications.map(n => `
                    <div onclick="collab.markNotificationRead('${n._id}')" class="p-3 text-left hover:bg-slate-50 dark:hover:bg-slate-900/50 cursor-pointer ${n.isRead ? 'opacity-60' : 'bg-sky-500/5'}">
                        <p class="font-semibold text-[11px] text-slate-800 dark:text-slate-200">${n.content}</p>
                        <p class="text-[8px] text-slate-500 mt-1 font-bold">${new Date(n.createdAt).toLocaleDateString('en-GB')}</p>
                    </div>
                `).join('');
            },

            async markNotificationRead(id) {
                try {
                    const token = localStorage.getItem('collab_token');
                    await fetch(`http://localhost:5000/api/notifications/${id}/read`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    this.fetchNotifications();
                } catch (e) {}
            },

            async markAllNotificationsRead() {
                try {
                    const token = localStorage.getItem('collab_token');
                    await fetch('http://localhost:5000/api/notifications/read/all', {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    this.fetchNotifications();
                } catch (e) {}
            },

            lockActivity(seq) {
                if (!this.projectId || !this.socket) return;
                const act = this.activities.find(a => a.sequenceNumber === seq);
                if (act) {
                    this.socket.emit('edit-activity-start', {
                        projectId: this.projectId,
                        activityId: act._id
                    });
                }
            },

            unlockActivity(seq) {
                if (!this.projectId || !this.socket) return;
                const act = this.activities.find(a => a.sequenceNumber === seq);
                if (act) {
                    this.socket.emit('edit-activity-end', {
                        projectId: this.projectId,
                        activityId: act._id
                    });
                }
            },

            renderPresence() {
                const container = document.getElementById('collab-presence-container');
                if (!container) return;
                if (this.onlineUsers.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                const avatars = this.onlineUsers.map(u => {
                    const initials = u.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    return `<div class="h-6 w-6 rounded-full bg-sky-500/10 border border-sky-500/30 text-sky-500 text-[9px] font-black font-outfit flex items-center justify-center shadow-sm" title="${u.name} (Online)">${initials}</div>`;
                }).join('');
                container.innerHTML = `
                    <div class="flex -space-x-1.5 mr-1.5">${avatars}</div>
                    <span class="text-[9px] font-bold text-slate-400 font-outfit uppercase tracking-widest">${this.onlineUsers.length} online</span>
                `;
            },

            renderLocks() {
                const rows = document.querySelectorAll('tbody tr');
                rows.forEach(row => {
                    const seqCell = row.querySelector('td:first-child');
                    if (seqCell) {
                        const seqStr = seqCell.innerText.trim();
                        const act = this.activities.find(a => a.sequenceNumber === parseInt(seqStr));
                        if (act) {
                            const lock = this.activeLocks.get(act._id.toString());
                            const editBtn = row.querySelector('button[onclick^="openEditActivityModal"]');
                            const lockIndicator = row.querySelector('.collab-lock-indicator');
                            
                            if (lock) {
                                if (editBtn) editBtn.disabled = true;
                                if (!lockIndicator) {
                                    const taskStepCell = row.querySelector('td:nth-child(2)');
                                    if (taskStepCell) {
                                        taskStepCell.insertAdjacentHTML('beforeend', `
                                            <p class="collab-lock-indicator text-[9px] text-amber-500 font-bold mt-1 flex items-center gap-1">
                                                <i class="fa-solid fa-lock animate-pulse"></i> ${lock.userName} is editing...
                                            </p>
                                        `);
                                    }
                                }
                            } else {
                                if (editBtn) editBtn.disabled = false;
                                if (lockIndicator) lockIndicator.remove();
                            }
                        }
                    }
                });
            },

            // COLLAB DISCUSSIONS
            async fetchComments() {
                if (!this.projectId) return;
                try {
                    const token = localStorage.getItem('collab_token');
                    const res = await fetch(`http://localhost:5000/api/comments/project/${this.projectId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const comments = await res.json();
                    this.renderComments(comments);
                } catch(e) {}
            },

            renderComments(comments) {
                const container = document.getElementById('collab-comments-tab-content');
                if (!container) return;

                // Group comments and replies
                const parents = comments.filter(c => !c.parentCommentId);
                const repliesMap = new Map();
                comments.forEach(c => {
                    if (c.parentCommentId) {
                        const pid = c.parentCommentId.toString();
                        if (!repliesMap.has(pid)) repliesMap.set(pid, []);
                        repliesMap.get(pid).push(c);
                    }
                });

                const html = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 py-6">
                        <div class="lg:col-span-2 flex flex-col bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                            <h3 class="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-comments text-sky-500"></i> Project Discussion Thread
                            </h3>
                            
                            <!-- Comment input -->
                            <div class="mb-6">
                                <textarea id="new-comment-text" placeholder="Write a comment..." class="w-full text-xs p-3 border border-slate-200 dark:border-slate-850 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/20 resize-none h-20 font-semibold"></textarea>
                                <div class="flex justify-end mt-2">
                                    <button onclick="collab.addComment()" class="bg-sky-500 hover:bg-sky-600 text-white font-bold text-xs px-4 py-2 rounded-lg transition-colors flex items-center gap-1.5"><i class="fa-solid fa-paper-plane text-[10px]"></i> Send Comment</button>
                                </div>
                            </div>

                            <div class="space-y-4 max-h-[450px] overflow-y-auto pr-2 divide-y divide-slate-100 dark:divide-slate-850">
                                ${parents.length === 0 ? `<p class="text-center text-slate-400 py-6 text-xs font-bold">No comments yet. Start the conversation!</p>` : parents.map(c => {
                                    const cReplies = repliesMap.get(c._id.toString()) || [];
                                    const initials = c.userName ? c.userName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : 'U';
                                    const canDelete = store.user.role === 'Admin' || c.userId === (JSON.parse(localStorage.getItem('collab_user'))?._id);

                                    return `
                                        <div class="pt-4 first:pt-0">
                                            <div class="flex items-start gap-3">
                                                <div class="h-8 w-8 rounded-xl bg-sky-500/10 text-sky-500 border border-sky-500/20 flex items-center justify-center text-xs font-black shrink-0">${initials}</div>
                                                <div class="flex-1 min-w-0">
                                                    <div class="flex justify-between items-center">
                                                        <h4 class="text-xs font-bold text-slate-800 dark:text-slate-200">${c.userName}</h4>
                                                        <div class="flex items-center gap-2">
                                                            <span class="text-[9px] text-slate-400 font-bold">${new Date(c.createdAt).toLocaleDateString('en-GB')}</span>
                                                            ${canDelete ? `<button onclick="collab.deleteComment('${c._id}')" class="text-rose-500 hover:text-rose-600" title="Delete"><i class="fa-regular fa-trash-can text-[10px]"></i></button>` : ''}
                                                        </div>
                                                    </div>
                                                    <p class="text-xs text-slate-600 dark:text-slate-350 mt-1 font-semibold">${c.content}</p>
                                                    
                                                    <div class="mt-2 flex items-center gap-2">
                                                        <button onclick="collab.toggleReplyForm('${c._id}')" class="text-[10px] text-sky-500 hover:underline font-bold"><i class="fa-solid fa-reply text-[8px]"></i> Reply</button>
                                                    </div>

                                                    <!-- Reply Input Form -->
                                                    <div id="reply-form-${c._id}" class="hidden mt-3">
                                                        <div class="flex gap-2">
                                                            <input type="text" id="reply-input-${c._id}" placeholder="Write a reply..." class="flex-1 text-xs p-2 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white rounded-lg focus:outline-none font-semibold">
                                                            <button onclick="collab.addComment('${c._id}')" class="bg-sky-500 hover:bg-sky-600 text-white font-bold text-xs px-3 rounded-lg transition-colors">Reply</button>
                                                            <button onclick="collab.toggleReplyForm('${c._id}')" class="px-2 text-slate-400 hover:text-rose-500 text-xs">Cancel</button>
                                                        </div>
                                                    </div>

                                                    <!-- Replies list -->
                                                    ${cReplies.length > 0 ? `
                                                        <div class="mt-3 pl-4 border-l border-slate-100 dark:border-slate-850 space-y-3">
                                                            ${cReplies.map(r => {
                                                                const rInitials = r.userName ? r.userName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : 'U';
                                                                const rCanDelete = store.user.role === 'Admin' || r.userId === (JSON.parse(localStorage.getItem('collab_user'))?._id);

                                                                return `
                                                                    <div class="flex items-start gap-2.5">
                                                                        <div class="h-6 w-6 rounded-lg bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 flex items-center justify-center text-[10px] font-black shrink-0">${rInitials}</div>
                                                                        <div class="flex-1 min-w-0">
                                                                            <div class="flex justify-between items-center">
                                                                                <h5 class="text-[11px] font-bold text-slate-800 dark:text-slate-200">${r.userName}</h5>
                                                                                <div class="flex items-center gap-2">
                                                                                    <span class="text-[8px] text-slate-400 font-bold">${new Date(r.createdAt).toLocaleDateString('en-GB')}</span>
                                                                                    ${rCanDelete ? `<button onclick="collab.deleteComment('${r._id}')" class="text-rose-500 hover:text-rose-600" title="Delete"><i class="fa-regular fa-trash-can text-[9px]"></i></button>` : ''}
                                                                                </div>
                                                                            </div>
                                                                            <p class="text-[11px] text-slate-600 dark:text-slate-350 mt-0.5 font-semibold">${r.content}</p>
                                                                        </div>
                                                                    </div>
                                                                `;
                                                            }).join('')}
                                                        </div>
                                                    ` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Sidebar: Audit log timeline -->
                        <div class="flex flex-col bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                            <h3 class="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-clock-rotate-left text-emerald-500"></i> Project Activity Stream
                            </h3>
                            <div id="collab-audit-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 text-xs font-semibold">
                                <p class="text-slate-400 text-center py-6">Loading activities...</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = html;
                this.fetchAuditLogs();
            },

            async fetchAuditLogs() {
                try {
                    const token = localStorage.getItem('collab_token');
                    const res = await fetch(`http://localhost:5000/api/activities/project/${this.projectId}/timeline`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const logs = await res.json();
                    const list = document.getElementById('collab-audit-list');
                    if (!list) return;

                    if (logs.length === 0) {
                        list.innerHTML = `<p class="text-center text-slate-400 py-6">No edits recorded yet.</p>`;
                        return;
                    }

                    list.innerHTML = logs.map(l => `
                        <div class="relative pl-5 border-l border-slate-100 dark:border-slate-850 pb-2">
                            <div class="absolute -left-1.5 top-1 h-3 w-3 rounded-full bg-emerald-500 border border-white dark:border-slate-950"></div>
                            <p class="font-bold text-slate-800 dark:text-slate-200">${l.activityName || 'Task Update'}</p>
                            <p class="text-[10px] text-slate-500 mt-0.5">${l.userName || 'System'} changed <span class="font-bold text-sky-500">${l.fieldChanged}</span> from "${l.oldValue || 'N/A'}" to "${l.newValue || 'N/A'}"</p>
                            <p class="text-[8px] text-slate-400 mt-1 font-bold">${new Date(l.changedAt).toLocaleDateString('en-GB')} ${new Date(l.changedAt).toLocaleTimeString()}</p>
                        </div>
                    `).join('');
                } catch(e) {}
            },

            toggleReplyForm(id) {
                const el = document.getElementById(`reply-form-${id}`);
                if (el) el.classList.toggle('hidden');
            },

            async addComment(parentId = null) {
                let content = '';
                if (parentId) {
                    const input = document.getElementById(`reply-input-${parentId}`);
                    if (input) {
                        content = input.value.trim();
                        input.value = '';
                    }
                } else {
                    const input = document.getElementById('new-comment-text');
                    if (input) {
                        content = input.value.trim();
                        input.value = '';
                    }
                }
                if (!content) return;

                try {
                    const token = localStorage.getItem('collab_token');
                    await fetch('http://localhost:5000/api/comments', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            projectId: this.projectId,
                            content,
                            parentCommentId: parentId
                        })
                    });
                    this.fetchComments();
                } catch(e) {}
            },

            async deleteComment(id) {
                if (!confirm("Are you sure you want to delete this comment?")) return;
                try {
                    const token = localStorage.getItem('collab_token');

        const API_BASE = window.location.origin;

        // Date formatter helper (DD-MM-YYYY)
        function formatDate(dateStr) {
            if (!dateStr || dateStr === 'N/A' || dateStr === 'nil') return 'N/A';
            const cleanStr = dateStr.includes('T') ? dateStr.split('T')[0] : dateStr;
            const parts = cleanStr.split('-');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateStr;
        }

        // API Client wrapper
        async function apiRequest(endpoint, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json'
            };
            if (store.token) {
                headers['Authorization'] = `Bearer ${store.token}`;
            }

            const config = {
                method,
                headers
            };

            if (body && method !== 'GET') {
                config.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, config);
                if (response.status === 401) {
                    logout();
                    throw new Error("Session expired. Please log in again.");
                }
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || `Request failed: ${response.statusText}`);
                }
                return await response.json();
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            }
        }

        async function downloadReportFile(url, fileName) {
            try {
                showToast("Generating report, please wait...", "info");
                
                const headers = {};
                if (store.token) {
                    headers['Authorization'] = `Bearer ${store.token}`;
                }

                const response = await fetch(url, {
                    method: 'GET',
                    headers: headers
                });
                
                if (response.status === 401) {
                    logout();
                    throw new Error("Session expired. Please log in again.");
                }
                
                if (!response.ok) {
                    throw new Error("Failed to download file. Server responded with status: " + response.status);
                }
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(blobUrl);
                showToast("Download started successfully.", "success");
            } catch (err) {
                showToast(err.message, "error");
            }
        }

        // Authentication logic
        function login(username, password) {
            apiRequest('/api/auth/login', 'POST', { username, password })
                .then(data => {
                    store.token = data.access_token;
                    store.user = data.user;
                    localStorage.setItem('pmis_token', data.access_token);
                    localStorage.setItem('pmis_user', JSON.stringify(data.user));

                    // Silent login to collaboration backend
                    const email = emailMap[username.toLowerCase()] || (username.includes('@') ? username : `${username}@navalpmis.gov`);
                    const collabPassword = password === 'admin' ? 'password123' : password;
                    
                    fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: collabPassword })
                    })
                    .then(res => res.json())
                    .then(collabData => {
                        if (collabData.token) {
                            localStorage.setItem('collab_token', collabData.token);
                            localStorage.setItem('collab_user', JSON.stringify(collabData.user));
                            collab.init();
                        }
                    })
                    .catch(err => console.error("Collab authentication failed:", err));

                    showToast("Login successful!", "success");
                    
                    if (data.user.role === 'Admin' && data.user.is_first_login) {
                        store.currentView = 'template-builder';
                    } else {
                        store.currentView = 'dashboard';
                    }
                    initApp();
                })
                .catch(() => {});
        }

        function logout() {
            store.token = '';
            store.user = null;
            localStorage.removeItem('pmis_token');
            localStorage.removeItem('pmis_user');
            localStorage.removeItem('collab_token');
            localStorage.removeItem('collab_user');
            if (collab.socket) {
                collab.socket.disconnect();
                collab.socket = null;
            }
            store.currentView = 'login';
            render();
        }

        function toggleTheme() {
            store.theme = store.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('pmis_theme', store.theme);
            applyTheme();
        }

        function applyTheme() {
            if (store.theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

        // UI Notification Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border text-white transition-all transform translate-y-10 opacity-0 duration-300 ${
                type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-rose-600 border-rose-500'
            }`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
                <span class="font-medium text-sm">${message}</span>
            `;
            document.body.appendChild(toast);
            
            // animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // remove
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Router
        function navigate(view, projectId = null) {
            // Leave old project collab session if navigating away
            if (view !== 'project-view' && collab.projectId) {
                collab.leaveProject(collab.projectId);
                collab.project = null;
                collab.projectId = null;
                collab.onlineUsers = [];
                collab.renderPresence();
            }

            store.currentView = view;
            if (projectId) {
                store.currentProjectId = projectId;
            }
            render();
            
            // Load fresh data depending on target view
            if (view === 'dashboard') {
                loadDashboardData();
            } else if (view === 'project-view' && projectId) {
                loadProjectWorkspace(projectId);
            } else if (view === 'template-builder') {
                loadTemplates();
            }
        }

        // Main lifecycle loaders
        async function loadDashboardData() {
            try {
                store.dashboardSummary = await apiRequest('/api/dashboard/summary');
                store.projects = await apiRequest('/api/projects');
                render();
            } catch (err) {}
        }

        async function loadTemplates() {
            try {
                store.templates = await apiRequest('/api/templates');
                render();
            } catch (err) {}
        }

        async function loadProjectWorkspace(projectId) {
            try {
                store.currentProject = await apiRequest(`/api/projects/${projectId}`);
                store.currentActivities = await apiRequest(`/api/projects/${projectId}/activities`);
                store.ganttData = await apiRequest(`/api/dashboard/gantt/${projectId}`);
                
                // Sync collaboration context
                if (store.currentProject) {
                    collab.syncProjectContext(store.currentProject.project_id_code);
                }

                // Get latest predictions or trigger one if not present
                try {
                    store.predictions = await apiRequest(`/api/projects/${projectId}/predict`, 'POST');
                } catch(e) {
                    store.predictions = null;
                }
                
                store.predictionHistory = await apiRequest(`/api/projects/${projectId}/prediction-history`);
                render();
            } catch (err) {}
        }

        async function updateActivityDetails(activityId, updates) {
            try {
                // Find local activity to map sequence number
                const localAct = store.currentActivities.find(a => a.id === activityId);
                if (localAct && collab.projectId) {
                    const collabAct = collab.activities.find(a => a.sequenceNumber === localAct.sequence_number);
                    if (collabAct) {
                        const token = localStorage.getItem('collab_token');
                        const nodeRes = await fetch(`http://localhost:5000/api/activities/${collabAct._id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                currentStatus: updates.current_status || localAct.current_status,
                                completionPercentage: updates.completion_percentage !== undefined ? updates.completion_percentage : localAct.completion_percentage,
                                actualStartDate: updates.actual_start_date !== undefined ? (updates.actual_start_date === 'N/A' || !updates.actual_start_date ? null : updates.actual_start_date) : localAct.actual_start_date,
                                actualEndDate: updates.actual_end_date !== undefined ? (updates.actual_end_date === 'N/A' || !updates.actual_end_date ? null : updates.actual_end_date) : localAct.actual_end_date,
                                durationMonths: updates.duration_months !== undefined ? updates.duration_months : localAct.duration_months,
                                remainingMonths: updates.remaining_months !== undefined ? updates.remaining_months : localAct.remaining_months,
                                remarks: updates.remarks || updates.change_reason || localAct.remarks,
                                version: collabAct.__v
                            })
                        });
                        
                        if (!nodeRes.ok) {
                            const errData = await nodeRes.json();
                            showToast("Collaboration block: " + errData.message, "error");
                            return; // Block SQLite write
                        }
                    }
                }

                await apiRequest(`/api/projects/${store.currentProjectId}/activities/${activityId}`, 'PUT', updates);
                showToast("Activity updated successfully. Schedule re-calculated.", "success");
                // Reload project details
                loadProjectWorkspace(store.currentProjectId);
            } catch (err) {
                showToast("Update failed: " + err.message, "error");
            }
        }

        async function changeActivityDurationMonths(activityId, durationMonthsValue) {
            try {
                const months = parseFloat(durationMonthsValue) || 1.0;
                await updateActivityDetails(activityId, {
                    duration_months: months,
                    remaining_months: months,
                    change_reason: "Adjusted planned duration"
                });
            } catch (err) {
                showToast("Failed to update activity duration", "error");

        }

            try {

                    await apiRequest(`/api/templates/${editingTemplateId}/full`, 'PUT', templateData);
                    showToast("Template changes saved successfully!", "success");
                } else {
                    await apiRequest('/api/templates', 'POST', templateData);
                    showToast("Workflow template saved successfully!", "success");

                wizardActivities = [];
                wizardLoops = [];

                // Complete first login wizard check

                    store.user.is_first_login = false;

                project_id_code: form.project_id_code.value,
                priority: form.priority.value,
                ship_type: form.ship_type.value,
                ship_class: form.ship_class.value,
                project_cost: parseFloat(form.project_cost.value),
                template_id: parseInt(form.template_id.value),

            };
            createNewProject(formData);
            closeCreateProjectModal();

        function openEditActivityModal(activityId) {
            const activity = store.currentActivities.find(a => a.id === activityId);
            if (!activity) {
                showToast("Activity not found in current project.", "error");
                return;
            }

            // Collaboration lock check
            if (collab.projectId) {
                const collabAct = collab.activities.find(a => a.sequenceNumber === activity.sequence_number);
                if (collabAct) {
                    const lock = collab.activeLocks.get(collabAct._id.toString());
                    if (lock) {
                        showToast(`Locked: This task is currently being edited by ${lock.userName || 'another user'}.`, "error");
                        return;
                    }
                    collab.lockActivity(activity.sequence_number);
                    store.editingSequenceNumber = activity.sequence_number;
                }
            }

            const form = document.getElementById('editActivityForm');
            form.activity_id.value = activity.id;
            form.current_status.value = activity.current_status || 'NotStarted';
            form.completion_percentage.value = activity.completion_percentage !== undefined ? activity.completion_percentage : 0;
            form.actual_start_date.value = activity.actual_start_date || '';
            form.actual_end_date.value = activity.actual_end_date || '';
            form.duration_months.value = activity.duration_months !== undefined ? activity.duration_months : 1.0;
            form.remaining_months.value = activity.remaining_months !== undefined ? activity.remaining_months : 1.0;
            form.remarks.value = activity.remarks || '';
            
            document.getElementById('editActivityModalTitle').innerText = activity.name;
            document.getElementById('editActivityModal').classList.remove('hidden');
        }

        function closeEditActivityModal() {
            document.getElementById('editActivityModal').classList.add('hidden');
            if (store.editingSequenceNumber) {
                collab.unlockActivity(store.editingSequenceNumber);
                store.editingSequenceNumber = null;
            }
        }

        async function submitEditActivityForm(form) {
            const activityId = parseInt(form.activity_id.value);
            const actualStart = form.actual_start_date.value;
            const actualEnd = form.actual_end_date.value;
            const durationMonths = parseFloat(form.duration_months.value) || 1.0;
            const remainingMonths = parseFloat(form.remaining_months.value) || 0.0;

            if (actualStart && actualEnd) {
                if (new Date(actualEnd) < new Date(actualStart)) {
                    showToast("Actual end date cannot be earlier than actual start date.", "error");
                    return;
                }
            }

            const updates = {
                current_status: form.current_status.value,
                completion_percentage: parseFloat(form.completion_percentage.value) || 0,
                actual_start_date: actualStart || null,
                actual_end_date: actualEnd || null,
                duration_months: durationMonths,
                remaining_months: remainingMonths,
                remarks: form.remarks.value || "",
                change_reason: form.remarks.value || "Manual update"
            };
            
            await updateActivityDetails(activityId, updates);
            closeEditActivityModal();

        function toggleSavedTemplatesModal(show) {
            const modal = document.getElementById('savedTemplatesModal');
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        async function loadTemplateIntoBuilder(templateId) {
            try {
                const details = await apiRequest(`/api/templates/${templateId}`);
                editingTemplateId = details.id;
                wizardTemplateName = details.name;
                wizardTemplateDesc = details.description || '';
                
                wizardActivities = details.activities.map(a => ({
                    name: a.name,
                    sequence_number: a.sequence_number,
                    category: a.category,
                    default_duration_months: a.default_duration_months,
                    historical_risk_weight: a.historical_risk_weight,
                    dependency_list: a.dependency_list || [],
                    is_milestone: a.is_milestone,
                    is_critical_path: a.is_critical_path
                }));
                wizardLoops = details.feedback_loops || [];
                
                showToast(`Template '${details.name}' loaded successfully!`, "success");
                toggleSavedTemplatesModal(false);
                render();
            } catch(e) {
                showToast("Failed to load template.", "error");
            }
        }

        function resetBuilderWorkspace() {
            editingTemplateId = null;
            wizardActivities = [];
            wizardLoops = [];

            const deps = form.dependency_list.value ? form.dependency_list.value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [];
            const durationVal = form.default_duration_months.value.trim().toLowerCase();
            const duration = (durationVal === 'nil' || durationVal === '') ? 0 : parseInt(durationVal) || 0;
            const riskWeightVal = parseFloat(form.historical_risk_weight.value);
            const riskWeight = isNaN(riskWeightVal) ? 50.0 : riskWeightVal;
            
            wizardActivities.push({
                name: form.name.value,
                sequence_number: parseInt(form.sequence_number.value),
                category: form.category.value,
                default_duration_months: duration,
                historical_risk_weight: riskWeight,
                dependency_list: deps,
                is_milestone: form.is_milestone.checked,
                is_critical_path: form.is_critical_path.checked
            });

            wizardActivities.sort((a, b) => a.sequence_number - b.sequence_number);
            form.reset();

        function addLoopToBuilder() {
            const from_val = document.getElementById('loop_from').value;
            const to_val = document.getElementById('loop_to').value.trim();
            const desc = document.getElementById('loop_desc').value.trim();
            if (!from_val || !to_val) {
                showToast("Please select 'From' task and specify 'To' task sequence IDs.", "error");
                return;
            }
            const from_seq = parseInt(from_val);
            const to_seqs = to_val.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            
            if (to_seqs.length === 0) {
                showToast("Please enter valid numeric To Task IDs.", "error");
                return;
            }
            
            let addedCount = 0;
            for (const to_seq of to_seqs) {
                if (from_seq <= to_seq) {
                    showToast(`Rework loop must link from a later task (${from_seq}) back to an earlier task (${to_seq}). Skipping.`, "error");
                    continue;
                }
                
                // Verify the "To" activity exists in wizardActivities
                const toActExists = wizardActivities.some(a => a.sequence_number === to_seq);
                if (!toActExists) {
                    showToast(`Task sequence #${to_seq} does not exist in template. Skipping.`, "error");
                    continue;
                }

                // Check if already exists
                const duplicate = wizardLoops.some(l => l.from_seq === from_seq && l.to_seq === to_seq);
                if (duplicate) {
                    continue;
                }
                
                wizardLoops.push({
                    from_seq: from_seq,
                    to_seq: to_seq,
                    description: desc || "Feedback/rework loop"
                });
                addedCount++;
            }
            
            if (addedCount > 0) {
                showToast(`Successfully added ${addedCount} feedback loop(s).`, "success");
            }
            render();
        }

            wizardLoops.splice(index, 1);

        }

            return `

                                            ${act.current_delay_days > 0 ? `<span class="text-rose-500 font-extrabold">+${act.current_delay_days}d</span>` : '-'}
                                        </td>
                                        <td class="px-5 py-4 font-black text-[10px] uppercase tracking-wider ${riskColors[act.predicted_risk] || 'text-slate-400'}">

                                        </td>

                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                ${summaryHtml}

                <!-- Edit Activity Modal -->
                <div id="editActivityModal" class="fixed inset-0 z-50 overflow-y-auto hidden" role="dialog" aria-modal="true">
                    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

                        <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                        <div class="inline-block align-middle bg-white dark:bg-slate-950 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md sm:w-full border border-slate-200 dark:border-slate-900">
                            <form id="editActivityForm" onsubmit="event.preventDefault(); submitEditActivityForm(this);">

        // Tab Workspace: Gantt Chart Visualization
        function renderGanttTab() {
            if (!store.ganttData || store.ganttData.activities.length === 0) {
                return `<div class="p-6 text-center text-slate-500">Generating Gantt timeline...</div>`;
            }

            const g = store.ganttData.activities;
            
            // Calculate project boundaries
            let minTime = Infinity;
            let maxTime = -Infinity;
            g.forEach(act => {
                if (act.start_date) {
                    const t = new Date(act.start_date).getTime();
                    if (t < minTime) minTime = t;
                }
                if (act.end_date) {
                    const t = new Date(act.end_date).getTime();
                    if (t > maxTime) maxTime = t;
                }
            });
            
            const oneDay = 24 * 60 * 60 * 1000;
            const oneMonth = 30 * oneDay;
            if (minTime === Infinity) minTime = new Date().getTime();
            if (maxTime === -Infinity) maxTime = new Date().getTime() + 12 * oneMonth;
            
            // Pad by 7 days start and end for safety margin
            minTime -= 7 * oneDay;
            maxTime += 7 * oneDay;
            
            const totalDuration = maxTime - minTime;
            const totalDays = Math.ceil(totalDuration / oneDay);
            const timelineWidth = 600; // SVG timeline width
            const labelWidth = 220;    // Width for row labels
            
            const rowHeight = 36;
            const height = g.length * rowHeight + 45;
            const width = labelWidth + timelineWidth + 30;

            // Initialize playback states
            if (store.playbackDay === undefined) store.playbackDay = 0;
            if (store.playbackActive === undefined) store.playbackActive = false;
            
            const playbackTime = minTime + store.playbackDay * oneDay;
            
            // Generate monthly grid markers
            let gridLines = '';
            let monthLabels = '';
            let currentDate = new Date(minTime);
            const endDate = new Date(maxTime);
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            while (currentDate < endDate) {
                const t = currentDate.getTime();
                const pct = (t - minTime) / totalDuration;
                const x = labelWidth + pct * timelineWidth;
                
                // Draw vertical line
                gridLines += `<line x1="${x}" y1="30" x2="${x}" y2="${height}" stroke="#e2e8f0" class="dark:stroke-slate-800" stroke-width="1" stroke-dasharray="2 2" />`;
                
                // Label month
                monthLabels += `<text x="${x + 8}" y="20" font-size="9" font-weight="800" fill="#94a3b8" class="uppercase select-none">${monthNames[currentDate.getMonth()]} '${String(currentDate.getFullYear()).slice(-2)}</text>`;
                
                // Advance to next month
                currentDate.setMonth(currentDate.getMonth() + 1);
            }

            // Draw playback vertical line if active/started
            if (store.playbackDay > 0) {
                const playPct = (playbackTime - minTime) / totalDuration;
                const playX = labelWidth + playPct * timelineWidth;
                gridLines += `
                    <line x1="${playX}" y1="30" x2="${playX}" y2="${height}" stroke="rgb(244, 63, 94)" stroke-width="2" stroke-dasharray="3 2" />
                    <circle cx="${playX}" cy="30" r="4.5" fill="rgb(244, 63, 94)" />
                `;
            }

            let svgRows = '';
            g.forEach((act, idx) => {
                const y = 35 + (idx * rowHeight);
                let startX = labelWidth + 20;
                let barWidth = 60;
                let sTime = 0;
                let eTime = 0;
                
                if (act.start_date && act.end_date) {
                    sTime = new Date(act.start_date).getTime();
                    eTime = new Date(act.end_date).getTime();
                    const leftPct = (sTime - minTime) / totalDuration;
                    const widthPct = (eTime - sTime) / totalDuration;
                    startX = labelWidth + leftPct * timelineWidth;
                    barWidth = Math.max(12, widthPct * timelineWidth);
                }
                
                const isCompleted = act.status === 'Completed';
                const baseColor = act.is_critical ? '#ef4444' : (isCompleted ? '#10b981' : '#3b82f6');
                
                // Opacity logic based on playback slider time
                let elementOpacity = "1.0";
                let progressVal = act.progress;
                
                if (store.playbackDay > 0) {
                    if (playbackTime < sTime) {
                        // Future task not yet reached in playback
                        elementOpacity = "0.15";
                        progressVal = 0;
                    } else if (playbackTime >= sTime && playbackTime < eTime) {
                        // Active task in progress in playback
                        elementOpacity = "0.85";
                        const actDur = eTime - sTime;
                        const elapsed = playbackTime - sTime;
                        progressVal = elapsed / actDur;
                    } else {
                        // Completed task relative to playback
                        elementOpacity = "1.0";
                        progressVal = act.progress;
                    }
                }
                
                const progressWidth = barWidth * progressVal;
                
                // Draw zebra strip background for rows
                gridLines += `<rect x="0" y="${y - 5}" width="${width}" height="${rowHeight}" fill="${idx % 2 === 0 ? 'rgba(241, 245, 249, 0.2)' : 'transparent'}" class="${idx % 2 === 0 ? 'dark:fill-slate-900/10' : ''}" />`;
                
                // Task name labels
                const criticalSymbol = act.is_critical ? `<tspan fill="#ef4444" font-weight="900">[!] </tspan>` : '';
                svgRows += `
                    <text x="10" y="${y + 16}" font-size="11" font-weight="700" fill="#475569" class="dark:fill-slate-350 select-none" opacity="${elementOpacity}">
                        ${criticalSymbol}${act.text.length > 25 ? act.text.substring(0, 23) + '..' : act.text}
                    </text>
                `;
                
                // Draw bar or milestone (diamond)
                if (act.is_milestone) {
                    const diamondX = startX;
                    const diamondY = y + 8;
                    const size = 12;
                    const points = `${diamondX},${diamondY - size} ${diamondX + size},${diamondY} ${diamondX},${diamondY + size} ${diamondX - size},${diamondY}`;
                    
                    svgRows += `
                        <polygon points="${points}" fill="${baseColor}" class="cursor-pointer transition-all hover:scale-110" opacity="${elementOpacity}" onclick="openEditActivityModal(${act.id})" />
                        <text x="${diamondX + 16}" y="${y + 12}" font-size="9" font-weight="800" fill="#94a3b8" class="uppercase select-none" opacity="${elementOpacity}">Milestone</text>
                    `;
                } else {
                    // Task bar background
                    svgRows += `
                        <rect x="${startX}" y="${y + 2}" width="${barWidth}" height="14" rx="4" fill="${baseColor}" opacity="${parseFloat(elementOpacity) * 0.2}" class="cursor-pointer" onclick="openEditActivityModal(${act.id})" />
                    `;
                    // Task bar progress inner
                    if (progressWidth > 0) {
                        svgRows += `
                            <rect x="${startX}" y="${y + 2}" width="${progressWidth}" height="14" rx="4" fill="${baseColor}" opacity="${elementOpacity}" class="cursor-pointer" onclick="openEditActivityModal(${act.id})" />
                        `;
                    }
                    // Add text inside bar if width allows, or after bar
                    const showText = `${Math.round(progressVal * 100)}%`;
                    svgRows += `
                        <text x="${startX + barWidth + 8}" y="${y + 12}" font-size="9" font-weight="bold" fill="#64748b" class="dark:fill-slate-400 select-none" opacity="${elementOpacity}">${showText} (${act.assignee})</text>
                    `;
                }
            });

            // Convert playbackTime to a readable date
            const playbackDateObj = new Date(playbackTime);
            const formattedPlaybackDate = `${playbackDateObj.getDate()} ${monthNames[playbackDateObj.getMonth()]} '${String(playbackDateObj.getFullYear()).slice(-2)}`;

            return `
                <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-200 dark:border-slate-900 shadow-sm flex flex-col animate-slide-up">
                    <div class="mb-4 flex flex-col md:flex-row md:items-center justify-between gap-3 border-b border-slate-100 dark:border-slate-900 pb-3">
                        <div class="space-y-0.5">

        }        // Tab Workspace: Dependency Graph Visualization
        function buildDependencyGraphSvg(activities, feedbackLoops, isTemplateMode = false) {
            if (!activities || activities.length === 0) {
                return `<div class="p-6 text-center text-slate-500 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl">No activities to display in graph.</div>`;
            }

            // 1. Normalize activities and dependencies to sequence numbers
            const seqToAct = {};
            const idToSeq = {};
            activities.forEach(a => {
                seqToAct[a.sequence_number] = a;
                if (!isTemplateMode) {
                    idToSeq[a.id] = a.sequence_number;
                }
            });

            const normalized = activities.map(a => {
                let deps = [];
                if (isTemplateMode) {
                    deps = a.dependency_list || [];
                } else {
                    const rawDeps = a.dependency_list || [];
                    rawDeps.forEach(depId => {
                        if (idToSeq[depId] !== undefined) {
                            deps.push(idToSeq[depId]);
                        }
                    });
                }
                return {
                    id: a.id || a.sequence_number,
                    sequence_number: a.sequence_number,
                    name: a.name,
                    category: a.category,
                    default_duration_months: a.default_duration_months,
                    historical_risk_weight: a.historical_risk_weight,
                    is_milestone: a.is_milestone,
                    is_critical_path: a.is_critical_path,
                    current_status: isTemplateMode ? 'NotStarted' : (a.current_status || 'NotStarted'),
                    planned_start_date: isTemplateMode ? '' : (a.planned_start_date || ''),
                    dependency_list: deps // list of sequence numbers
                };
            });

            // Maps and sets for topological layout
            const normSeqToAct = {};
            normalized.forEach(a => { normSeqToAct[a.sequence_number] = a; });

            const inDegree = {};
            const adj = {};
            normalized.forEach(a => {
                inDegree[a.sequence_number] = 0;
                adj[a.sequence_number] = [];
            });

            normalized.forEach(a => {
                const deps = a.dependency_list || [];
                deps.forEach(depSeq => {
                    if (normSeqToAct[depSeq]) {
                        adj[depSeq].push(a.sequence_number);
                        inDegree[a.sequence_number]++;
                    }
                });
            });

            // Assign layers
            const queue = [];
            const layers = {};
            normalized.forEach(a => {
                if (inDegree[a.sequence_number] === 0) {
                    queue.push({ seq: a.sequence_number, layer: 0 });
                }
            });

            let maxLayer = 0;
            const visited = {};
            while (queue.length > 0) {
                const { seq, layer } = queue.shift();
                layers[seq] = Math.max(layers[seq] || 0, layer);
                if (layers[seq] > maxLayer) maxLayer = layers[seq];

                const neighbors = adj[seq] || [];
                neighbors.forEach(neighSeq => {
                    layers[neighSeq] = Math.max(layers[neighSeq] || 0, layers[seq] + 1);
                    if (!visited[neighSeq]) {
                        queue.push({ seq: neighSeq, layer: layers[neighSeq] });
                    }
                });
                visited[seq] = true;
            }

            const layerGroups = {};
            for (let i = 0; i <= maxLayer; i++) {
                layerGroups[i] = [];
            }
            normalized.forEach(a => {
                const layer = layers[a.sequence_number] !== undefined ? layers[a.sequence_number] : 0;
                if (!layerGroups[layer]) layerGroups[layer] = [];
                layerGroups[layer].push(a);
            });

            for (const layer in layerGroups) {
                layerGroups[layer].sort((a, b) => a.sequence_number - b.sequence_number);
            }

            // Coordinates
            const cardWidth = 200;
            const cardHeight = 80;
            const horizontalGap = 80;
            const verticalGap = 30;
            const paddingX = 30;
            const paddingY = 30;

            const nodeCoords = {}; // sequence_number -> {x, y}
            let maxNodesInLayer = 0;

            for (let layer = 0; layer <= maxLayer; layer++) {
                const nodes = layerGroups[layer] || [];
                if (nodes.length > maxNodesInLayer) maxNodesInLayer = nodes.length;

                nodes.forEach((act, idx) => {
                    const x = paddingX + layer * (cardWidth + horizontalGap);
                    const y = paddingY + idx * (cardHeight + verticalGap);
                    nodeCoords[act.sequence_number] = { x, y };
                });
            }

            const svgWidth = paddingX * 2 + (maxLayer + 1) * (cardWidth + horizontalGap) - horizontalGap;
            const svgHeight = paddingY * 2 + maxNodesInLayer * (cardHeight + verticalGap) - verticalGap + 90;

            // Connections
            let svgPaths = '';
            normalized.forEach(a => {
                const deps = a.dependency_list || [];
                const toCoord = nodeCoords[a.sequence_number];
                if (!toCoord) return;

                deps.forEach(depSeq => {
                    const fromCoord = nodeCoords[depSeq];
                    if (!fromCoord) return;

                    const xStart = fromCoord.x + cardWidth;
                    const yStart = fromCoord.y + cardHeight / 2;
                    const xEnd = toCoord.x;
                    const yEnd = toCoord.y + cardHeight / 2;

                    const isCritical = a.is_critical_path && normSeqToAct[depSeq] && normSeqToAct[depSeq].is_critical_path;
                    const strokeColor = isCritical ? 'rgb(244, 63, 94)' : '#94a3b8';
                    const strokeWidth = isCritical ? '3' : '1.8';

                    svgPaths += `
                        <path d="M ${xStart} ${yStart} C ${xStart + 40} ${yStart}, ${xEnd - 40} ${yEnd}, ${xEnd} ${yEnd}"
                              fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" marker-end="url(#arrow)" />
                    `;
                });
            });

            // Loops
            let svgLoops = '';
            feedbackLoops.forEach((l, idx) => {
                const fromCoord = nodeCoords[l.from_seq];
                const toCoord = nodeCoords[l.to_seq];
                if (!fromCoord || !toCoord) return;

                const xStart = fromCoord.x + cardWidth / 2;
                const yStart = fromCoord.y + cardHeight;
                const xEnd = toCoord.x + cardWidth / 2;
                const yEnd = toCoord.y + cardHeight;

                const loopIndex = idx + 1;
                const sweepY = Math.max(45, 40 + loopIndex * 20);

                svgLoops += `
                    <path d="M ${xStart} ${yStart} C ${xStart} ${yStart + sweepY}, ${xEnd} ${yEnd + sweepY}, ${xEnd} ${yEnd}"
                          fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-loop)" />
                    
                    <rect x="${(xStart + xEnd)/2 - 50}" y="${yStart + sweepY - 12}" width="100" height="13" rx="3" fill="#fcfaff" stroke="#e9d5ff" stroke-width="0.5" />
                    <text x="${(xStart + xEnd)/2}" y="${yStart + sweepY - 3}" font-size="8" font-weight="bold" fill="#7e22ce" text-anchor="middle" class="select-none">
                        Rework Loop (${l.from_seq} ➔ ${l.to_seq})
                    </text>
                `;
            });

            // Nodes
            let svgNodes = '';
            normalized.forEach(a => {
                const coord = nodeCoords[a.sequence_number];
                if (!coord) return;

                let statusBorder = '';
                let extraHtml = '';
                
                if (isTemplateMode) {
                    // Color-code by category in template builder
                    const categoryColors = {
                        Technical: 'border-indigo-500 bg-indigo-50/20 text-indigo-950 dark:text-indigo-300',
                        Procurement: 'border-amber-500 bg-amber-50/20 text-amber-955 dark:text-amber-300',
                        Construction: 'border-emerald-500 bg-emerald-50/20 text-emerald-955 dark:text-emerald-300',
                        Inspection: 'border-teal-500 bg-teal-50/20 text-teal-955 dark:text-teal-300',
                        Testing: 'border-purple-500 bg-purple-50/20 text-purple-955 dark:text-purple-300',
                        Delivery: 'border-rose-500 bg-rose-50/20 text-rose-955 dark:text-rose-300',
                        Administrative: 'border-sky-500 bg-sky-50/20 text-sky-955 dark:text-sky-300',
                        Documentation: 'border-slate-500 bg-slate-50/20 text-slate-955 dark:text-slate-350'
                    };
                    statusBorder = categoryColors[a.category] || 'border-slate-200 bg-slate-50 dark:border-slate-800 dark:bg-slate-900/10 text-slate-700';
                    extraHtml = `<span>Duration: ${a.default_duration_months}m</span><span>Risk: ${a.historical_risk_weight}%</span>`;
                } else {
                    const statusColorBorders = {
                        Completed: 'border-emerald-500 bg-emerald-50/20 text-emerald-955 dark:text-emerald-300',
                        InProgress: 'border-blue-500 bg-blue-50/20 text-blue-955 dark:text-blue-300',
                        Delayed: 'border-amber-500 bg-amber-50/20 text-amber-955 dark:text-amber-300',
                        Blocked: 'border-rose-500 bg-rose-50/20 text-rose-955 dark:text-rose-300',
                        NotStarted: 'border-slate-200 dark:border-slate-800 bg-slate-50/40 dark:bg-slate-900/10 text-slate-700 dark:text-slate-400'
                    };
                    statusBorder = statusColorBorders[a.current_status] || statusColorBorders.NotStarted;
                    extraHtml = `<span>Plan: ${a.planned_start_date ? a.planned_start_date.split('-')[2]+'/'+a.planned_start_date.split('-')[1] : '-'}</span><span>Status: ${a.current_status}</span>`;
                }

                const pathHighlight = a.is_critical_path ? 'ring-2 ring-rose-500 ring-offset-1 dark:ring-offset-slate-950' : '';
                const clickHandler = isTemplateMode ? '' : `onclick="openEditActivityModal(${a.id})"`;

                svgNodes += `
                    <g transform="translate(${coord.x}, ${coord.y})" class="${isTemplateMode ? 'cursor-default' : 'cursor-pointer'}" ${clickHandler}>
                        <foreignObject width="${cardWidth}" height="${cardHeight}">
                            <div xmlns="http://www.w3.org/1999/xhtml" class="h-full w-full rounded-xl border-2 p-2 flex flex-col justify-between shadow-sm select-none transition-all hover:scale-102 hover:shadow-md ${statusBorder} ${pathHighlight}">
                                <div class="flex items-start justify-between">
                                    <span class="text-[8px] font-extrabold uppercase tracking-wider opacity-60">Task #${a.sequence_number}</span>
                                    <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-slate-200/50 dark:bg-slate-800/80">${a.category}</span>
                                </div>
                                <h6 class="font-extrabold text-[10px] leading-tight truncate mt-1 flex items-center gap-1">
                                    ${a.is_milestone ? '⚓' : ''} ${a.name}
                                </h6>
                                <div class="flex items-center justify-between text-[8px] mt-1 font-semibold opacity-75">
                                    ${extraHtml}
                                </div>
                            </div>
                        </foreignObject>
                    </g>
                `;
            });

            return `
                <svg width="${svgWidth}" height="${svgHeight}" class="min-w-full">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
                        </marker>
                        <marker id="arrow-loop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 1 L 10 5 L 0 9 z" fill="#a855f7" />
                        </marker>
                    </defs>
                    ${svgPaths}
                    ${svgLoops}
                    ${svgNodes}
                </svg>
            `;
        }
